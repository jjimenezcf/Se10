<header class="sticky top-0 bg-white border-b border-slate-200 z-30">
  <div class="px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <div class="flex justify-start">
        <button id="sidebar-toggler"
          class="text-gray-600 lg:-translate-x-20 translate-x-0 border-r pr-4 mr-5 transition-all duration-300 ease-in-out"
          (click)="changeSidebarHideable.emit(); $event.stopPropagation()">
          <fa-icon [icon]="barsIcon" size="2x"></fa-icon>
        </button>
        <div class="lg:-translate-x-16 transition-all duration-300 ease-in-out">
          <div class="text-lg text-sky-600 font-medium">Sistema de elementos</div>
          <div class="mb-1.5">
            <app-breadcrumb></app-breadcrumb>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
