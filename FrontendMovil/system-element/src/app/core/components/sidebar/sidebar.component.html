<div #sidebar
  class="flex flex-col absolute z-40 left-0 top-0 lg:static lg:left-auto lg:top-auto lg:translate-x-0 transform h-screen no-scrollbar w-full md:w-64 shrink-0 bg-gray-800 transition-all duration-200 ease-in-out -translate-x-full overflow-auto drop-shadow-2xl text-sm"
  [ngClass]="{'!-translate-x-0': hideable}">
  <div class="grid pt-5 relative content-center px-4">
    <div class="flex items-center space-x-2 bg-gray-950 px-4 py-3 rounded-lg relative">
      <div class="w-10 h-10 rounded-full bg-gray-400 grid justify-center content-center">
        <div class="text-white">{{nameInitials}}</div>
      </div>
      <div class="font-medium text-white max-w-15 md:max-w-8">
        <ng-container
          *ngTemplateOutlet="displayName; context: { $implicit: authUser.lastName + ', ' + authUser.name }"></ng-container>
        <ng-template #displayName let-name>
          <div class="truncate" [title]="name">{{name}}
          </div>
        </ng-template>
        <a class="text-sky-400 hover:underline cursor-pointer" (click)="onCloseSession()">Cerrar sesión</a>
      </div>
    </div>
    <div
      class="absolute bg-sky-600 right-0 text-white rounded-l-full cursor-pointer hover:bg-sky-400 h-11 grid content-center text-center w-9 mt-7 shadow-lg lg:hidden"
      (click)="onChangeHideable()" [ngClass]="{'hidden': !hideable}">
      <fa-icon class="ms-1 hidden md:block" [icon]="chevronLeftIcon" [fixedWidth]="true"></fa-icon>
      <fa-icon class="ms-1 block md:hidden" [icon]="xmarkIcon" [fixedWidth]="true"></fa-icon>
    </div>
  </div>
  <div class="overflow-y-auto px-4">
    <ul class="space-y-2 mt-4">
      <li *ngFor="let item of items" [ngClass]="item.extraClasses" (click)="onClick(item); $event.stopPropagation()"
        [routerLink]="item.path"
        class="px-3 py-2 rounded-sm mb-0.5 last:mb-0 hover:bg-white hover:text-black text-white duration-200 cursor-pointer"
        [ngClass]="{'bg-gray-950': isItemActive(item)}">
        <a [routerLink]="item.path" class="block truncate">
          <div class="flex items-center">
            <span class="font-medium ml-3 2xl:opacity-100">{{item.name}}</span>
          </div>
        </a>
      </li>
    </ul>
  </div>
</div>
